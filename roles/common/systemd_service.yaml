- name: "Copy {{component}} service file"
  ansible.builtin.copy:
    src: "{{component}}.service"
    dest: "/etc/systemd/system/{{component}}.service"

- name: Daemon-reload
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: restart and enable
  ansible.builtin.service:
    name: "{{component}}"
    state: restarted
    enabled: yes