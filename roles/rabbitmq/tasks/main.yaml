- name: Configure YUM Repos erlang script for rabbitmq
  ansible.builtin.shell: curl -s https://packagecloud.io/install/repositories/rabbitmq/erlang/script.rpm.sh | bash

- name: Configure YUM Repos for RabbitMQ
  ansible.builtin.shell: curl -s https://packagecloud.io/install/repositories/rabbitmq/rabbitmq-server/script.rpm.sh | bash

- name: install rabbitmq
  ansible.builtin.package:
    name: rabbitmq-server
    state: present
  
- name: Start and enable RabbitMQ
  ansible.builtin.service:
    name: rabbitmq-server 
    state: started
    enabled: yes

- name: create username and password for rabbitmq
  ansible.builtin.command: rabbitmqctl add_user {{rq_user}} {{rq_password}}

- name: set permission for rabbitmq
  ansible.builtin.shell: rabbitmqctl set_permissions -p / roboshop ".*" ".*" ".*"